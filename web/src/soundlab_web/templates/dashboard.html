{% extends "base.html" %}
{% block title %}Sound Lab{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold text-gray-800 mb-6">Tools</h1>
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    {% for tool in tools %}
    <a href="{{ tool.route }}" class="block bg-white rounded-lg shadow-sm border hover:shadow-md transition-shadow p-6">
        <div class="text-3xl mb-3">{{ tool.icon }}</div>
        <h2 class="text-lg font-semibold text-gray-800 mb-2">{{ tool.name }}</h2>
        <p class="text-sm text-gray-500">{{ tool.description }}</p>
    </a>
    {% endfor %}
</div>
{% endblock %}
