<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sound Lab{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm border-b">
        <div class="px-4 py-3 flex items-center gap-4">
            <a href="/" class="text-xl font-bold text-gray-800">Sound Lab</a>
            <span class="text-gray-400 hidden lg:inline">|</span>
            <a href="/" class="text-sm text-gray-500 hover:text-gray-700 hidden lg:inline">Home</a>
        </div>
    </nav>
    <div class="flex flex-1">
        <aside class="hidden lg:block w-56 bg-white border-r shrink-0">
            <nav class="py-4">
                <a href="/"
                   class="flex items-center gap-2 px-4 py-2 text-sm {% if request.url.path == '/' %}text-blue-600 bg-blue-50 font-medium{% else %}text-gray-600 hover:bg-gray-50{% endif %}">
                    🏠 Home
                </a>
                <div class="px-4 pt-4 pb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">Tools</div>
                {% for tool in tools %}
                <a href="{{ tool.route }}"
                   class="flex items-center gap-2 px-4 py-2 text-sm {% if request.url.path.startswith(tool.route) %}text-blue-600 bg-blue-50 font-medium{% else %}text-gray-600 hover:bg-gray-50{% endif %}">
                    {{ tool.icon }} {{ tool.name }}
                </a>
                {% endfor %}
                <div class="px-4 pt-4 pb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">System</div>
                <a href="/settings/"
                   class="flex items-center gap-2 px-4 py-2 text-sm {% if request.url.path.startswith('/settings') %}text-blue-600 bg-blue-50 font-medium{% else %}text-gray-600 hover:bg-gray-50{% endif %}">
                    Settings
                </a>
            </nav>
        </aside>
        <main class="flex-1 max-w-5xl px-4 py-8 lg:px-8">
            {% block content %}{% endblock %}
        </main>
    </div>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
