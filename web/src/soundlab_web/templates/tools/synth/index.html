{% extends "base.html" %}
{% block title %}Web Synth - Sound Lab{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold text-gray-800 mb-6">Web Synth</h1>

<div class="bg-white rounded-lg shadow-sm border p-6 space-y-6">

    <!-- Controls -->
    <div class="flex flex-wrap items-center gap-6">
        <!-- Waveform selector -->
        <div>
            <label class="flex items-center gap-1 text-sm font-medium text-gray-700 mb-1">
                Waveform
                <span class="info-tip">i<span class="info-tip-text">音色のベースとなる波形を選択。Sine=柔らかい、Square=ファミコン風、Sawtooth=明るく力強い、Triangle=素朴で丸い音</span></span>
            </label>
            <div id="waveform-selector" class="flex gap-2">
                <button data-wave="sine"     class="wave-btn px-3 py-1 text-sm rounded border">Sine</button>
                <button data-wave="square"   class="wave-btn px-3 py-1 text-sm rounded border">Square</button>
                <button data-wave="sawtooth" class="wave-btn px-3 py-1 text-sm rounded border">Sawtooth</button>
                <button data-wave="triangle" class="wave-btn px-3 py-1 text-sm rounded border">Triangle</button>
            </div>
        </div>
        <!-- Volume slider -->
        <div>
            <label for="volume" class="flex items-center gap-1 text-sm font-medium text-gray-700 mb-1">
                Volume: <span id="volume-display">50</span>%
                <span class="info-tip">i<span class="info-tip-text">全体の音量（マスターボリューム）を調整します</span></span>
            </label>
            <input type="range" id="volume" min="0" max="100" value="50" class="w-40">
        </div>
        <!-- Octave control -->
        <div>
            <label class="flex items-center gap-1 text-sm font-medium text-gray-700 mb-1">
                Octave: <span id="octave-display">4</span>
                <span class="info-tip">i<span class="info-tip-text">鍵盤の音域を変更（範囲: 1〜7）。キーボードの Z/X キーでも操作できます</span></span>
            </label>
            <div class="flex gap-2">
                <button id="octave-down" class="px-3 py-1 text-sm rounded border hover:bg-gray-100">-</button>
                <button id="octave-up"   class="px-3 py-1 text-sm rounded border hover:bg-gray-100">+</button>
            </div>
        </div>
    </div>

    <!-- Effects -->
    <div class="border-t pt-4">
        <h2 class="text-sm font-semibold text-gray-700 mb-3">Effects</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

            <!-- Filter -->
            <div class="space-y-2">
                <label class="flex items-center gap-1 text-xs font-medium text-gray-500 uppercase tracking-wider">
                    Filter
                    <span class="info-tip">i<span class="info-tip-text">特定の周波数帯域をカットして音色を変化させるフィルター。LP=高音カット、HP=低音カット、BP=指定周波数付近のみ通す</span></span>
                </label>
                <div class="flex gap-1">
                    <button data-filter="off"      class="filter-btn px-2 py-1 text-xs rounded border">Off</button>
                    <button data-filter="lowpass"   class="filter-btn px-2 py-1 text-xs rounded border">LP</button>
                    <button data-filter="highpass"  class="filter-btn px-2 py-1 text-xs rounded border">HP</button>
                    <button data-filter="bandpass"  class="filter-btn px-2 py-1 text-xs rounded border">BP</button>
                </div>
                <div id="filter-params" class="space-y-1 hidden">
                    <div>
                        <label class="flex items-center gap-1 text-xs text-gray-500">
                            Freq: <span id="filter-freq-display">8000</span>Hz
                            <span class="info-tip">i<span class="info-tip-text">カットオフ周波数（100〜8000Hz）。この周波数を境にフィルターが効きます</span></span>
                        </label>
                        <input type="range" id="filter-freq" min="100" max="8000" value="8000" step="10" class="w-full h-1">
                    </div>
                    <div>
                        <label class="flex items-center gap-1 text-xs text-gray-500">
                            Q: <span id="filter-q-display">1.0</span>
                            <span class="info-tip">i<span class="info-tip-text">レゾナンス（0.1〜20）。カットオフ付近の音を強調する度合い。高いほどクセが強くなります</span></span>
                        </label>
                        <input type="range" id="filter-q" min="0.1" max="20" value="1" step="0.1" class="w-full h-1">
                    </div>
                </div>
            </div>

            <!-- Delay -->
            <div class="space-y-2">
                <label class="flex items-center gap-1 text-xs font-medium text-gray-500 uppercase tracking-wider">
                    Delay
                    <span class="info-tip">i<span class="info-tip-text">やまびこのように音を遅らせて繰り返すエコー効果。Time/Feedbackで繰り返しの間隔と回数、Mixで効果の強さを調整</span></span>
                </label>
                <div>
                    <label class="flex items-center gap-1 text-xs text-gray-500">
                        Time: <span id="delay-time-display">0.00</span>s
                        <span class="info-tip">i<span class="info-tip-text">繰り返しの間隔（0〜1秒）</span></span>
                    </label>
                    <input type="range" id="delay-time" min="0" max="1" value="0" step="0.01" class="w-full h-1">
                </div>
                <div>
                    <label class="flex items-center gap-1 text-xs text-gray-500">
                        Feedback: <span id="delay-feedback-display">0.00</span>
                        <span class="info-tip">i<span class="info-tip-text">繰り返しの減衰量（0〜0.9）。高いほど長く繰り返します</span></span>
                    </label>
                    <input type="range" id="delay-feedback" min="0" max="0.9" value="0" step="0.01" class="w-full h-1">
                </div>
                <div>
                    <label class="flex items-center gap-1 text-xs text-gray-500">
                        Mix: <span id="delay-mix-display">0</span>%
                        <span class="info-tip">i<span class="info-tip-text">原音とディレイ音のバランス。0%=原音のみ、100%=エコーのみ</span></span>
                    </label>
                    <input type="range" id="delay-mix" min="0" max="100" value="0" class="w-full h-1">
                </div>
            </div>

            <!-- Reverb -->
            <div class="space-y-2">
                <label class="flex items-center gap-1 text-xs font-medium text-gray-500 uppercase tracking-wider">
                    Reverb
                    <span class="info-tip">i<span class="info-tip-text">空間の残響をシミュレート。部屋やホールで鳴っているような広がりのある音になります</span></span>
                </label>
                <div>
                    <label class="flex items-center gap-1 text-xs text-gray-500">
                        Decay: <span id="reverb-decay-display">2.0</span>s
                        <span class="info-tip">i<span class="info-tip-text">残響の長さ（0.5〜5秒）。長いほど広い空間のような響きになります</span></span>
                    </label>
                    <input type="range" id="reverb-decay" min="0.5" max="5" value="2" step="0.1" class="w-full h-1">
                </div>
                <div>
                    <label class="flex items-center gap-1 text-xs text-gray-500">
                        Mix: <span id="reverb-mix-display">0</span>%
                        <span class="info-tip">i<span class="info-tip-text">原音とリバーブ音のバランス。0%=原音のみ、100%=残響のみ</span></span>
                    </label>
                    <input type="range" id="reverb-mix" min="0" max="100" value="0" class="w-full h-1">
                </div>
            </div>

        </div>
    </div>

    <!-- Visual keyboard -->
    <div id="keyboard" class="relative select-none" style="height: 180px;"></div>

    <!-- Keyboard shortcut reference -->
    <div class="text-xs text-gray-400 text-center space-y-1">
        <p>White keys: <kbd class="px-1 py-0.5 bg-gray-100 border rounded text-gray-500">A</kbd>
           <kbd class="px-1 py-0.5 bg-gray-100 border rounded text-gray-500">S</kbd>
           <kbd class="px-1 py-0.5 bg-gray-100 border rounded text-gray-500">D</kbd>
           <kbd class="px-1 py-0.5 bg-gray-100 border rounded text-gray-500">F</kbd>
           <kbd class="px-1 py-0.5 bg-gray-100 border rounded text-gray-500">G</kbd>
           <kbd class="px-1 py-0.5 bg-gray-100 border rounded text-gray-500">H</kbd>
           <kbd class="px-1 py-0.5 bg-gray-100 border rounded text-gray-500">J</kbd>
           <kbd class="px-1 py-0.5 bg-gray-100 border rounded text-gray-500">K</kbd>
           &nbsp; Black keys: <kbd class="px-1 py-0.5 bg-gray-100 border rounded text-gray-500">W</kbd>
           <kbd class="px-1 py-0.5 bg-gray-100 border rounded text-gray-500">E</kbd>
           &nbsp;
           <kbd class="px-1 py-0.5 bg-gray-100 border rounded text-gray-500">T</kbd>
           <kbd class="px-1 py-0.5 bg-gray-100 border rounded text-gray-500">Y</kbd>
           <kbd class="px-1 py-0.5 bg-gray-100 border rounded text-gray-500">U</kbd></p>
        <p>Octave: <kbd class="px-1 py-0.5 bg-gray-100 border rounded text-gray-500">Z</kbd> down /
           <kbd class="px-1 py-0.5 bg-gray-100 border rounded text-gray-500">X</kbd> up</p>
    </div>

</div>
{% endblock %}

{% block extra_scripts %}
<script src="/static/js/synth.js"></script>
{% endblock %}
