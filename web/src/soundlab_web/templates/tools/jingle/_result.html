<div class="bg-green-50 border border-green-200 rounded-lg p-6">
    <p class="text-green-700 font-medium mb-3">Generation complete!</p>

    <audio controls class="w-full mb-4">
        <source src="/tools/jingle/audio/{{ job.filename }}" type="audio/{{ 'mpeg' if job.filename.endswith('.mp3') else 'wav' }}">
    </audio>

    <div class="text-sm text-gray-600 space-y-1 mb-4">
        <p><span class="font-medium">Prompt:</span> {{ job.prompt }}</p>
        <p><span class="font-medium">Duration:</span> {{ job.duration }}s</p>
        <p><span class="font-medium">Model:</span> {{ job.model_version }}</p>
    </div>

    <a href="/tools/jingle/download/{{ job.filename }}"
       class="inline-block bg-green-600 text-white text-sm font-medium py-2 px-4 rounded-md hover:bg-green-700 transition-colors">
        Download
    </a>
</div>
